name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Read version
        id: version
        shell: powershell
        run: |
          $v = (Get-Content QuickLabel\VERSION -Raw).Trim()
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build launcher exe
        shell: powershell
        run: |
          $Root = "QuickLabel"
          $Dist = "$Root\dist"
          New-Item -ItemType Directory -Force $Dist | Out-Null

          pyinstaller `
            --onefile `
            --console `
            --name QuickLabel `
            --workpath "$Root\build" `
            --distpath $Dist `
            --specpath "$Root\build" `
            --noconfirm `
            "$Root\launcher.py"

          Copy-Item "$Dist\QuickLabel.exe" "$Root\QuickLabel.exe" -Force

      - name: Package release zip via git archive
        shell: powershell
        run: |
          $Version = "${{ steps.version.outputs.VERSION }}"
          $ZipName = "QuickLabel_v$Version.zip"
          $Dist    = "QuickLabel\dist"
          $ZipPath = "$Dist\$ZipName"
          $Stage   = "$Dist\stage"

          New-Item -ItemType Directory "$Stage\QuickLabel" | Out-Null

          # Export only git-tracked files (honours .gitignore)
          # --output must be inside the repo (git security restriction)
          $TarPath = "$Dist\ql_archive.tar"
          git archive --output $TarPath HEAD -- QuickLabel/
          tar -xf $TarPath -C $Stage
          Remove-Item $TarPath -Force

          # Inject the freshly-built exe (gitignored, so not in archive)
          Copy-Item "QuickLabel\QuickLabel.exe" "$Stage\QuickLabel\QuickLabel.exe" -Force

          Compress-Archive -Path "$Stage\*" -DestinationPath $ZipPath
          Remove-Item $Stage -Recurse -Force

          $SizeMB = [math]::Round((Get-Item $ZipPath).Length / 1MB, 1)
          Write-Host "Zip: $ZipName ($SizeMB MB)"
          echo "ZIP_NAME=$ZipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "QuickLabel v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: QuickLabel/dist/${{ env.ZIP_NAME }}
